    }
}

// Stress test for the goal-level parallel prover: run a few large splitting proofs many times at a
// high (over-subscribed) worker count and assert each one closes. Slow (minutes), so it is gated out
// of the normal unit-test suite and only runs here. Guards against reintroducing a concurrency race
// that makes proofs nondeterministically fail to close. See MtStressTest.
tasks.register('testMt2w', Test) {
    description = 'Run a small RunAllProofs set on the multi-core prover with 2 workers'
    group = 'verification'
    forkEvery = 1
    filter { includeTestsMatching "RunSmallProofsMt2wTest" }
}

// The 4-worker variant of testMt2w. Kept as its own task so CI can drop it if a runner cannot
// sustain four over-subscribed workers (the 2-worker task is the must-pass one).
tasks.register('testMt4w', Test) {
    description = 'Run a small RunAllProofs set on the multi-core prover with 4 workers'
    group = 'verification'
    forkEvery = 1
    filter { includeTestsMatching "RunSmallProofsMt4wTest" }
}

tasks.register('testMtStress', Test) {
    description = 'Stress the parallel prover at high worker counts to catch non-closure races'
    group = 'verification'
    systemProperty("key.mt.stress", "true")
    maxParallelForks = 1
    // Each class proves many full proofs; give every test class a fresh JVM so global KeY state
    // (settings, static caches/interners, the script parser) cannot leak between classes -- e.g.
    // MtScriptStressTest's position-sensitive script must not inherit state from earlier classes.
    forkEvery = 1
    filter {
        includeTestsMatching "MtStressTest"
        includeTestsMatching "MtMacroStressTest"
        includeTestsMatching "MtScriptStressTest"
        includeTestsMatching "MtDeterminismCiTest"
    }
}

//Generation of the three version files within the resources by executing `git'.
tasks.register('generateVersionFiles') {
    def outputFolder = file("build/resources/main/de/uka/ilkd/key/util")
    def sha1 = new File(outputFolder, "sha1")
    def branch = new File(outputFolder, "branch")
    def versionf = new File(outputFolder, "version")

    inputs.files "$project.rootDir/.git/HEAD"
    outputs.files sha1, branch, versionf

    def gitRevision = gitRevParse('HEAD')
    def gitBranch = gitRevParse('--abbrev-ref HEAD')

    doLast {
        sha1.text = gitRevision
        branch.text = gitBranch
        versionf.text = rootProject.version
    }
}

// Helper function that calls "git rev-parse" to
// find names/SHAs for commits
static def gitRevParse(String args) {
    try {
        return "git rev-parse $args".execute().text.trim()
    } catch (Exception e) {
        return ""
    }
}

