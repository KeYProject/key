sourceSets.main.java.srcDirs("$projectDir/build/generated-src/antlr4/main/")


tasks.register('generateSMTListings') {
    def pack = "de/uka/ilkd/key/smt/newsmt2"
    def resourcesDir = "${project.projectDir}/src/main/resources"
    def outputDir = resourcesDir // in the future that should be "${project.buildDir}/resources/main"
    // ${project.buildDir}
    inputs.files fileTree("$resourcesDir/$pack", {
        exclude "$resourcesDir/$pack/DefinedSymbolsHandler.preamble.xml"
    })
    outputs.files file("$outputDir/$pack/DefinedSymbolsHandler.preamble.xml")
    doLast {
        new File("$outputDir/$pack/DefinedSymbolsHandler.preamble.xml").withWriter { list ->
            list.writeLine '<?xml version="1.0" encoding="UTF-8" standalone="no"?>'
            list.writeLine '<!DOCTYPE properties SYSTEM "http://java.sun.com/dtd/properties.dtd">'
            list.writeLine '<properties>'
            new File("$resourcesDir/$pack").eachFile {
                if (it.name.endsWith('.DefinedSymbolsHandler.preamble.xml')) {
                    // println it.name
                    it.eachLine { list.writeLine it }
                }
            }
            list.writeLine '</properties>'
        }
    }
}

tasks.register('generateSolverPropsList') {
    def pack = "de/uka/ilkd/key/smt/solvertypes"
    def resourcesDir = "${project.projectDir}/src/main/resources"
    def outputDir = resourcesDir // in the future that should be "${project.buildDir}/resources/main"
    // ${project.buildDir}
    inputs.files fileTree("$outputDir/$pack/", {
        exclude "./solvers.txt"
    })
    outputs.files file("$outputDir/$pack/solvers.txt")
    doLast {
        def list = []
        def dir = new File("$outputDir/$pack/")
        dir.eachFileRecurse({ file ->
            if (file.name.endsWith(".props")) {
                list.add(file.name)
            }
        })
        list.sort()
        String files = ''
        for (String propsFile : list) {
            files += propsFile + System.lineSeparator()
        }
        new File("$outputDir/$pack/solvers.txt").withWriter { listSolvers ->
            listSolvers.write files
        }
    }
}

classes.dependsOn << generateSMTListings
classes.dependsOn << generateSolverPropsList


tasks.withType(Test) {
    enableAssertions = true
    // The whole suite is pinned to the single-threaded prover in the root build (key.prover.parallel
    // = false); opt-in parallel tests override it at runtime. The forwarding loop below still lets
    // the Gradle command line override it (e.g. -Dkey.prover.parallel=true).
    // Forward the multithreading / parallel-prover properties from the Gradle command line to the
    // test JVM (Gradle does not propagate -D automatically). Lets one run e.g.
    //   ./gradlew :key.core:test --tests '*MtSpeedupBenchmark' -Dkey.mt.benchmark=true
    // or toggle the parallel prover for any test via -Dkey.prover.parallel(.threads).
    ["key.mt.benchmark", "key.mt.benchmark.threads", "key.mt.benchmark.proofs",
     "key.mt.benchmark.maxsteps",
     "key.mt.synth.splits", "key.mt.synth.worksplits", "key.mt.synth.work",
     "key.mt.synth.linear", "key.mt.synth.loop",
     "key.mt.jfr.probe", "key.mt.jfr.proof", "key.mt.jfr.workers", "key.mt.jfr.reps",
     "key.prover.parallel", "key.prover.parallel.threads"].each { p ->
        if (System.getProperty(p) != null) {
            systemProperty(p, System.getProperty(p))
        }
    }
    // Record a Flight Recording of the test JVM when -Dkey.mt.jfr=<file> is given. Used to profile
    // the parallel prover's lock contention and hot paths (see MtJfrProbe).
    if (System.getProperty("key.mt.jfr") != null) {
        jvmArgs += ["-XX:StartFlightRecording=filename=${System.getProperty('key.mt.jfr')}," +
                    "settings=profile,dumponexit=true,disk=true",
                    "-XX:FlightRecorderOptions=stackdepth=128"]
    }
    // Forward retention-probe knobs (see MtRetentionProbe) to the test JVM.
    // Other test cases also need "key." prefixed properties
    systemProperties += System.properties.findAll { it.key.toString().startsWith("key.") }
    if (project.hasProperty("stressHeap")) {
        maxHeapSize = project.property("stressHeap")
    }
    if (System.getProperty("key.mt.retention.root") == "true") {
        jvmArgs += [
            "--add-opens", "java.base/java.lang=ALL-UNNAMED",
            "--add-opens", "java.base/java.lang.ref=ALL-UNNAMED",
            "--add-opens", "java.base/java.util=ALL-UNNAMED",
            "--add-opens", "java.base/java.util.concurrent=ALL-UNNAMED",
            "--add-opens", "java.base/java.util.concurrent.locks=ALL-UNNAMED",
            "--add-opens", "java.base/java.util.concurrent.atomic=ALL-UNNAMED"
        ]
    }
}


